name: Daily Game Ranking Crawl

on:
  schedule:
    # Run at 00:00 UTC (09:00 KST) every day
    - cron: '0 0 * * *'

  # Allow manual trigger
  workflow_dispatch:

jobs:
  crawl-and-notify:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r game_ranking_crawler/requirements.txt

      - name: Run crawler
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          python -m game_ranking_crawler.main

      - name: Commit and push snapshots
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add snapshots/
          git diff --staged --quiet || git commit -m "chore: Add daily ranking snapshot $(date +'%Y-%m-%d')"
          git push
        continue-on-error: true

      - name: Upload snapshots as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ranking-snapshots-${{ github.run_id }}
          path: snapshots/
          retention-days: 30
